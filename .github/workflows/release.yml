name: Package and Release Theme

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (strict semver, e.g. 1.2.3)'
        required: true
        type: number

permissions:
  contents: write

jobs:
  package-and-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN}}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Validate tag is strict semver
        run: |
          TAG="${{ inputs.tag_name }}"
          if ! [[ "${{ inputs.tag_name }}" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '${{ inputs.tag_name }}' is not a valid semver. Expected format: 1.2.3"
            exit 1
          fi

      - name: Verify tag does not already exist
        run: |
          if git rev-parse "${{ inputs.tag_name }}" >/dev/null 2>&1; then
            echo "::error::Tag '${{ inputs.tag_name }}' already exists. Choose a different tag name."
            exit 1
          fi
          if gh release view "${{ inputs.tag_name }}" >/dev/null 2>&1; then
            echo "::error::Release '${{ inputs.tag_name }}' already exists. Choose a different tag name."
            exit 1
          fi

      - name: Verify tag contains manifest version as substring
        run: |
          TAG="${{ inputs.tag_name }}"
          MANIFEST_VERSION=$(jq -r '.version' theme/manifest.json)
          if [ -z "$MANIFEST_VERSION" ] || [ "$MANIFEST_VERSION" == "null" ]; then
            echo "::error::Could not read version from theme/manifest.json"
            exit 1
          fi
          if [[ "$TAG" != *"$MANIFEST_VERSION"* ]]; then
            echo "::error::Tag '$TAG' does not contain manifest.json version '$MANIFEST_VERSION' as a substring."
            exit 1
          fi
          echo "Manifest version '$MANIFEST_VERSION' confirmed within tag '$TAG'."

      - name: Generate updates.json
        run: |
          ADDON_ID=$(jq -r '.browser_specific_settings.gecko.id' theme/manifest.json)
          MANIFEST_VERSION=$(jq -r '.version' theme/manifest.json)
          REPO="${{ github.repository }}"
          TAG="${{ inputs.tag_name }}"
          UPDATE_LINK="https://github.com/${REPO}/releases/download/${TAG}/Perfectly-OLED-${TAG}.xpi"

          jq -n \
            --arg id "$ADDON_ID" \
            --arg version "$MANIFEST_VERSION" \
            --arg link "$UPDATE_LINK" \
            '{addons: {($id): {updates: [{version: $version, update_link: $link}]}}}' \
            > theme/updates.json

          echo "Generated theme/updates.json:"
          cat theme/updates.json

      - name: Commit updates.json to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add theme/updates.json
          if git diff --cached --quiet; then
            echo "No changes to updates.json to commit."
          else
            git commit -m "Update theme/updates.json for ${{ inputs.tag_name }}"
            git push origin HEAD:${{ github.ref_name }}
          fi

      - name: Package as .zip
        run: |
          cd theme
          zip -X -r "../Perfectly-OLED-${{ inputs.tag_name }}.zip" .
          cd ..

      - name: Package as .xpi
        run: |
          cd theme
          zip -X -r "../Perfectly-OLED-${{ inputs.tag_name }}.xpi" .
          cd ..

      - name: Create git tag
        run: |
          git tag "${{ inputs.tag_name }}"
          git push origin "${{ inputs.tag_name }}"

      - name: Create GitHub release with artifacts
        run: |
          gh release create "${{ inputs.tag_name }}" \
            "Perfectly-OLED-${{ inputs.tag_name }}.zip" \
            "Perfectly-OLED-${{ inputs.tag_name }}.xpi" \
            --title "${{ inputs.tag_name }}" \
            --notes "Automated packaging of `/theme/` folder as .zip and .xpi"
